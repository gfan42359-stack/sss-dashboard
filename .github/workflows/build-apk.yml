name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Create WebView App
        run: |
          mkdir -p app/src/main/java/com/sss/dashboard app/src/main/res/values

          cat > settings.gradle << 'EOF'
          rootProject.name = 'SSSDashboard'
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins { id 'com.android.application' version '8.2.0' apply false }
          EOF

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'com.sss.dashboard'
            compileSdk 34
            defaultConfig {
              applicationId "com.sss.dashboard"
              minSdk 21; targetSdk 34; versionCode 1; versionName "1.0"
            }
            buildTypes { release { minifyEnabled false } }
            compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application android:label="SSS 工厂看板" android:theme="@android:style/Theme.NoTitleBar" android:hardwareAccelerated="true">
              <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize">
                <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/sss/dashboard/MainActivity.java << 'EOF'
          package com.sss.dashboard;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          import android.webkit.WebChromeClient;
          import android.view.WindowManager;
          public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle b) {
              super.onCreate(b);
              getWindow().addFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN);
              WebView wv = new WebView(this);
              WebSettings ws = wv.getSettings();
              ws.setJavaScriptEnabled(true);
              ws.setDomStorageEnabled(true);
              ws.setDatabaseEnabled(true);
              ws.setAllowFileAccess(true);
              wv.setWebViewClient(new WebViewClient() {
                public boolean shouldOverrideUrlLoading(WebView view, String url) {
                  view.loadUrl(url);
                  return true;
                }
              });
              wv.setWebChromeClient(new WebChromeClient());
              wv.loadUrl("https://FG-maker779.github.io/sss-dashboard/");
              setContentView(wv);
            }
          }
          EOF

      - name: Build APK
        run: |
          ./gradlew assembleRelease

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sss-dashboard-apk
          path: "app/build/outputs/apk/release/*.apk"
